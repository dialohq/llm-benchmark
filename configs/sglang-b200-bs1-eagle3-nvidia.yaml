description: |
  sglang TP=1 + EAGLE3 spec, k=2, with NVIDIA's default Eagle3 draft.
  iter-32 — apply iter-26 lesson to sglang: previous sglang EAGLE3 with
  lmsys draft (iter-17) regressed -25%; let's see if NVIDIA's draft
  unlocks the gain here as well.
engine: sglang
cmd: sglang
args:
  - serve
  - --model-path
  - openai/gpt-oss-120b
  - --tp
  - "1"
  - --attention-backend
  - trtllm_mha
  - --cuda-graph-max-bs
  - "4"
  - --max-running-requests
  - "1"
  - --mem-fraction-static
  - "0.85"
  - --speculative-algorithm
  - EAGLE3
  - --speculative-draft-model-path
  - nvidia/gpt-oss-120b-Eagle3
  - --speculative-num-steps
  - "2"
  - --speculative-eagle-topk
  - "1"
  - --speculative-num-draft-tokens
  - "3"
cwd: sglang
venv: sglang/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/sglang/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  MPICC: $MPICC
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  CUDA_VISIBLE_DEVICES: "0"
  SGLANG_ENABLE_SPEC_V2: "1"
