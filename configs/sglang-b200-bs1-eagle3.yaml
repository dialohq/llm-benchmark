description: |
  sglang serve openai/gpt-oss-120b on a single B200, TP=1.
  iter-17 deviation from sglang baseline (iter-14): EAGLE3 speculative
  decoding using lmsys/EAGLE3-gpt-oss-120b-bf16 as the draft head.
  Per scout report, sglang's EAGLE3 path is more cuda-graph-friendly
  than vllm's (which regressed -33% in iter-16). Spec V2 env var fuses
  EAGLE3 with the overlap scheduler.
  num_steps=3, eagle_topk=1 (chain-verify path, cuda-graph friendly),
  num_draft_tokens=4.
engine: sglang
cmd: sglang
args:
  - serve
  - --model-path
  - openai/gpt-oss-120b
  - --tp
  - "1"
  - --attention-backend
  - trtllm_mha
  - --cuda-graph-max-bs
  - "1"
  - --max-running-requests
  - "1"
  - --mem-fraction-static
  - "0.85"
  - --speculative-algorithm
  - EAGLE3
  - --speculative-draft-model-path
  - lmsys/EAGLE3-gpt-oss-120b-bf16
  - --speculative-num-steps
  - "3"
  - --speculative-eagle-topk
  - "1"
  - --speculative-num-draft-tokens
  - "4"
cwd: sglang
venv: sglang/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/sglang/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  MPICC: $MPICC
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  CUDA_VISIBLE_DEVICES: "0"
  SGLANG_ENABLE_SPEC_V2: "1"
