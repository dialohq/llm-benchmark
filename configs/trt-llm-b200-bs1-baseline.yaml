description: |
  trtllm-serve openai/gpt-oss-120b on a single B200, TP=1.
  iter-18 baseline for the trt-llm engine sweep. --backend pytorch
  (skips the TRT engine build step; gpt-oss MXFP4 doesn't have a
  pre-built TRT engine recipe yet). max_batch_size=1, max_seq_len=4096.
  Default kv_cache settings, default MoE backend (TRTLLM trtllm-gen).
engine: trt-llm
# TRT-LLM 1.3 always uses MPI for the executor process pool, even at TP=1.
# Wrapping with `mpirun -np 1` gives mpi4py a real MPI universe; without
# it MPI_Comm_spawn errors out at engine init. --allow-run-as-root because
# this container runs as root.
cmd: mpirun
args:
  - --allow-run-as-root
  - -np
  - "1"
  - trtllm-serve
  # Point at the local HF snapshot path so trt-llm doesn't try to fetch a
  # different revision (it does NOT use the existing cache by name when
  # the requested revision differs from the cached commit hash). 60 GiB
  # of safetensors don't fit on free disk if it re-downloads.
  - /root/.cache/huggingface/hub/models--openai--gpt-oss-120b/snapshots/b5c939de8f754692c1647ca79fbf85e8c1e70f8a
  - --backend
  - pytorch
  - --tp_size
  - "1"
  - --max_batch_size
  - "1"
  - --max_seq_len
  - "4096"
cwd: trt-llm
venv: trt-llm/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/trt-llm/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  MPICC: $MPICC
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  CUDA_VISIBLE_DEVICES: "0"
