# iter-43: iter-26 winner (default Eagle3 k=2 + PDL) + full torch.compile
# stack. First-time engine startup will spend many minutes compiling
# (Inductor + piecewise CUDA graph captures + userbuffers); subsequent
# starts hit the torch_aot_compile cache. Capture num_tokens for both
# the BS=1 decode shape and the BS=3 EAGLE3 verify shape (k=2).
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 2
  speculative_model_dir: nvidia/gpt-oss-120b-Eagle3
disable_overlap_scheduler: true
cuda_graph_config:
  enable_padding: true
  batch_sizes: [1, 3]
torch_compile_config:
  enable_fullgraph: true
  enable_inductor: false
  enable_piecewise_cuda_graph: true
  capture_num_tokens: [1, 3]
  enable_userbuffers: true
  max_num_streams: 1
