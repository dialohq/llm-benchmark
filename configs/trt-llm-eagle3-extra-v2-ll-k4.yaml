# Eagle3-v2 + NVIDIA low-latency flags. k=4 — higher than NVIDIA's recipe;
# if v2's MT-Bench AL≈2.68 (vs ~2.4 for default) the marginal acceptance
# at position 4 may still be positive.
speculative_config:
  decoding_type: Eagle3
  max_draft_len: 4
  speculative_model_dir: nvidia/gpt-oss-120b-Eagle3-v2
  eagle3_one_model: true
disable_overlap_scheduler: true
cuda_graph_config:
  enable_padding: true
  batch_sizes: [1, 5]
enable_min_latency: true
enable_autotuner: false
stream_interval: 20
num_postprocess_workers: 2
