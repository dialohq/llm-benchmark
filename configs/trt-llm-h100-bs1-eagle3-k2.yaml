description: |
  H100 single-GPU TRT-LLM port of B200 iter-26 best (477.67 tok/s):
  EAGLE3 nvidia/gpt-oss-120b-Eagle3 default draft k=2, TP=1, PDL on,
  cuda_graph_config batch_sizes=[1,3], disable_overlap_scheduler.
  Tests trt-llm pytorch backend on Hopper for the same workload that
  vllm hit 246.13 tok/s on (TP=1, Marlin).
engine: trt-llm
cmd: mpirun
args:
  - --allow-run-as-root
  - -np
  - "1"
  - trtllm-serve
  - /root/.cache/huggingface/hub/models--openai--gpt-oss-120b/snapshots/b5c939de8f754692c1647ca79fbf85e8c1e70f8a
  - --backend
  - pytorch
  - --tp_size
  - "1"
  - --max_batch_size
  - "8"
  - --max_seq_len
  - "4096"
  - --extra_llm_api_options
  - /projects/llm-benchmark/configs/trt-llm-eagle3-extra-default-k2.yaml
cwd: trt-llm
venv: trt-llm/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/trt-llm/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  MPICC: $MPICC
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  CUDA_VISIBLE_DEVICES: "0"
  TRTLLM_ENABLE_PDL: "1"
