description: |
  Smoke config: trtllm-serve + Qwen2.5-0.5B-Instruct, TP=1, --backend pytorch.
  Used to verify the proxy end-to-end against a real engine without
  needing 120B-param weights cached. Run inside `nix develop .#trt-llm`.
engine: trt-llm
# TRT-LLM 1.3 always uses MPI for the executor process pool, even at TP=1.
# Wrapping with `mpirun -np 1` gives mpi4py a real MPI universe; without
# it MPI_Comm_spawn errors out at engine init. --allow-run-as-root because
# this container runs as root.
cmd: mpirun
args:
  - --allow-run-as-root
  - -np
  - "1"
  - trtllm-serve
  - serve
  - Qwen/Qwen2.5-0.5B-Instruct
  - --backend
  - pytorch
  - --tp_size
  - "1"
  - --max_batch_size
  - "1"
  - --max_seq_len
  - "2048"
cwd: trt-llm
venv: trt-llm/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/trt-llm/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  MPICC: $MPICC
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  CUDA_VISIBLE_DEVICES: "0"
