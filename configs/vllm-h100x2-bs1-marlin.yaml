description: |
  H100x2 + iter-A: VLLM_MXFP4_USE_MARLIN=1. On Hopper SM90 the default MXFP4
  MoE backend lands on Triton (TRTLLM_MXFP4_BF16 is SM100+, AITER is ROCm).
  Marlin is the documented BS=1 fix per vllm issue #28894 / PR #30528.
  Same compile/spec config as the recipe baseline.
engine: vllm
cmd: vllm
args:
  - serve
  - openai/gpt-oss-120b
  - --tensor-parallel-size
  - "2"
  - --gpu-memory-utilization
  - "0.90"
  - --max-model-len
  - "4096"
  - --max-num-seqs
  - "1"
  - --speculative-config
  - '{"method":"eagle3","model":"nvidia/gpt-oss-120b-Eagle3","num_speculative_tokens":2}'
  - --compilation-config
  - '{"custom_ops":["+rms_norm"],"pass_config":{"fuse_allreduce_rms":true,"eliminate_noops":true},"cudagraph_mode":"FULL_AND_PIECEWISE"}'
cwd: vllm
venv: vllm/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/vllm/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  VLLM_MXFP4_USE_MARLIN: "1"
