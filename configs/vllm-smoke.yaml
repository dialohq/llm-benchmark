description: |
  Smoke config: vllm + Qwen2.5-0.5B-Instruct, TP=1, --enforce-eager.
  Used to verify the proxy end-to-end against a real engine without
  needing 120B-param weights cached. Run inside `nix develop .#vllm`.
engine: vllm
cmd: vllm
args:
  - serve
  - Qwen/Qwen2.5-0.5B-Instruct
  - --tensor-parallel-size
  - "1"
  - --enforce-eager
  - --gpu-memory-utilization
  - "0.50"
  - --max-model-len
  - "2048"
cwd: vllm
venv: vllm/.venv
warmup: 3
env:
  PATH: $REPO_ROOT/vllm/.venv/bin:$PATH
  HOME: $HOME
  CC: $CC
  HF_HUB_ENABLE_HF_TRANSFER: "1"
  UV_HTTP_TIMEOUT: "600"
  CUDA_HOME: $CUDA_HOME
  CUDA_PATH: $CUDA_PATH
  TRITON_LIBCUDA_PATH: $TRITON_LIBCUDA_PATH
  LIBRARY_PATH: $LIBRARY_PATH
  CPATH: $CPATH
  NIX_LD: $NIX_LD
  NIX_LD_LIBRARY_PATH: $NIX_LD_LIBRARY_PATH
  TRITON_CACHE_DIR: $TRITON_CACHE_DIR
  TORCHINDUCTOR_CACHE_DIR: $TORCHINDUCTOR_CACHE_DIR
  FLASHINFER_WORKSPACE_BASE: $FLASHINFER_WORKSPACE_BASE
  VLLM_CACHE_ROOT: $VLLM_CACHE_ROOT
  CUDA_VISIBLE_DEVICES: "0"
